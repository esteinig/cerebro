# release ci: build linux binaries and attach to release with SHA256

name: build

on:
  workflow_dispatch:
    release:
      types: [ published ]

permissions:
  contents: write

jobs:

  build:
    name: ${{ matrix.platform.os_name }} with rust ${{ matrix.toolchain }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: Linux-aarch64
            os: ubuntu-20.04
            target: aarch64-unknown-linux-musl
            bin: cerebro-${{ github.event.release.tag_name }}-linux-arm64  # semver release tag
          - os_name: Linux-x86_64
            os: ubuntu-20.04
            target: x86_64-unknown-linux-gnu
            bin: cerebro-${{ github.event.release.tag_name }}-linux-amd64  # semver release tag
        toolchain:
          - stable
    steps:
      - uses: actions/checkout@v3
      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: "build"
          target: ${{ matrix.platform.target }}
          toolchain: ${{ matrix.toolchain }}
          args: "--locked --release"
          strip: true
      - name: Rename binary (linux and macos)
        run: mv target/${{ matrix.platform.target }}/release/cerebro target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}
        if: matrix.platform.os_name != 'Windows-x86_64'
      - name: Generate SHA-256 of uncompressed binary
        run: shasum -a 256 target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} | cut -d ' ' -f 1 > target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}.sha256
      - name: Compress binary
        run: tar -cJf target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}.tar.xz target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}
      - name: Release binary and SHA-256 checksum to GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}.tar.xz
            target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}.sha256

  # cerebro-ciqa GPU build (`--features local`, pulls CUDA/cuDNN via meta-gpt/local).
  #
  # Added with Stage 01. This validates the on-device inference build that ships in the
  # NVIDIA container (templates/stack/docker/Dockerfile.gpt.dgx). It requires a CUDA-capable
  # runner; until a self-hosted GPU runner is wired up it runs on the standard runner and is
  # allowed to fail (`continue-on-error`) so it never blocks a release. Tracked as a
  # production-readiness gap (P0.1 / CI): swap `runs-on` to a `[self-hosted, gpu]` label and
  # drop `continue-on-error` once a GPU runner exists.
  build-local:
    name: cerebro-ciqa (--features local / CUDA)
    runs-on: ubuntu-20.04        # TODO(readiness): replace with [self-hosted, gpu]
    continue-on-error: true       # TODO(readiness): remove once a GPU runner is available
    steps:
      - uses: actions/checkout@v3
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build cerebro-ciqa with the local (GPU) feature
        run: cargo build -p cerebro-ciqa --release --locked --features local
