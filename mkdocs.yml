site_name: Cerebro
site_description: >-
  Cerebro — metagenomic diagnostics pipeline, collaborative reporting stack, and
  production subsystems for clinical and public-health environments.
# Set these for your repository before the first deploy:
# site_url: https://<org-or-user>.github.io/<repo>/
repo_url: https://github.com/esteinig/cerebro
repo_name: esteinig/cerebro
edit_uri: edit/feat/production/docs/

docs_dir: docs

theme:
  name: material
  language: en
  palette:
    # Light scheme (default) — calm, clinical, professional
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark scheme (optional)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Subsystems:
      - cerebro-fs:
          - cerebro-fs/index.md
          - Overview: cerebro-fs/overview.md
          - Architecture: cerebro-fs/architecture.md
          - Operations:
              - Administration: cerebro-fs/administration.md
              - Maintenance: cerebro-fs/maintenance.md
              - Storage & replication: cerebro-fs/fs-replication.md
              - Catalogue backup: cerebro-fs/catalogue-backup.md
              - Consistency reconcile: cerebro-fs/consistency-reconcile.md
              - Archival: cerebro-fs/archival.md
              - Verify & repair: cerebro-fs/verify-repair.md
              - Disaster recovery: cerebro-fs/disaster-recovery.md
          - Reference:
              - Validation: cerebro-fs/validation.md
          - Governance:
              - Production readiness: cerebro-fs/production-readiness.md
