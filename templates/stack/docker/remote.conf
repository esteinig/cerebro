# Cerebro FS — S3 archival (Glacier) remote configuration for Model B.
#
# This file is a set of `weed shell` commands. Apply it against the running
# filer to register the archival remote:
#
#     weed shell -filer="cerebro-fs-filer:{{{ fs.filer.port }}}" < /etc/seaweedfs/remote.conf
#
# Once configured, cold / read-only volumes are tier-moved to the remote as an
# operational step (schedule via cron). Confirm the exact flags against your
# SeaweedFS version (the stack pins 3.64 in Dockerfile.fs):
#
#     weed shell -filer="cerebro-fs-filer:{{{ fs.filer.port }}}" \
#       -c "volume.tier.move -fromDiskType=hdd -dest={{{ fs.remote.name }}}"
#
# Objects served from Glacier are not immediately retrievable: cerebro-fs marks
# them `archived` and follows the restore contract (`cerebro-fs restore`).
#
# TODO! NOTE: credentials are rendered here for convenience. In production prefer
# supplying them via environment/secret and removing them from this file.

remote.configure -name={{{ fs.remote.name }}} -s3.endpoint={{{ fs.remote.endpoint }}} -s3.region={{{ fs.remote.region }}} -s3.access_key={{{ fs.remote.access_key }}} -s3.secret_key={{{ fs.remote.secret_key }}} -s3.storage_class={{{ fs.remote.storage_class }}}
