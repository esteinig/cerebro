version: "3.8"

services:

  {{#if traefik.launch }}
  reverse-proxy:
    image: traefik:v2.10
    restart: unless-stopped
    ports:
      # To be able to listen on port 80 (http) - check firewall settings
      - mode: host
        published: 80
        target: 80
      # To be able to listen on port 443 (https) - check firewall settings
      - mode: host
        published: 443
        target: 443
    volumes:
      # Set the container timezone by sharing the read-only localtime
      - /etc/localtime:/etc/localtime:ro 
      # Give access to the UNIX Docker socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Map the static configuration into the container
      - {{{ outdir }}}/traefik/static.yml:/etc/traefik/traefik.yml:ro
      # Map the dynamic configuration into the container
      - {{{ outdir }}}/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      # Set the location where the local ACME certificate is saved
      - {{{ outdir }}}/certs:/etc/traefik/certs                                           
    networks:
      - proxy
    security_opt:
      - no-new-privileges:true
  {{/if}}
  
  {{#unless fs.fs_only}}

  # Envionment variable file is copied into container from deployment configuration
  # and not loaded as Docker environment variables
  cerebro-app:
    restart: unless-stopped
    build:
      context: {{{ outdir }}}/cerebro
      dockerfile: {{{ outdir }}}/docker/Dockerfile.app
      {{#if dev}}
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
      {{/if}}
    {{#if dev }}
    # Development run server - DO NOT RUN IN PRODUCTION
    command: npm run dev
    {{else}}
    # Production run of build - show latest tag, branch, commit of deployed repository
    command: node -r dotenv/config build
    {{/if}}
    {{#if dev}}
    ports:
      - "8000:8000"
    {{else}}
    # Production mode on localhost also needs to expose the ports to host
    {{#if traefik.is_localhost}}
    ports:
      - "8000:8000"
    {{/if}}
    {{/if}}
    expose:
      - 8000
    volumes:
      {{#if dev }}
      - {{{ outdir }}}/cerebro/app/:/app
      - /app/node_modules
      {{/if}}
      - {{{ outdir }}}/cerebro_api/app.env:/app/.env:ro
    networks:
      {{#if traefik.is_localhost }}
      - cerebro
      {{else}}
      - cerebro
      - proxy
      {{/if}}
    security_opt:
      - no-new-privileges:true
    depends_on:  
      - cerebro-api
      - cerebro-database
      - cerebro-auth-session
      - cerebro-auth-onetime
    labels:
      {{#if traefik.is_localhost }}
      traefik.enable: "false"
      {{else}}
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      traefik.http.routers.cerebro-app-{{{ traefik.subdomain.router.app }}}.rule: "Host(`{{{ traefik.subdomain.app }}}.{{{ traefik.web.domain }}}`)"
      traefik.http.routers.cerebro-app-{{{ traefik.subdomain.router.app }}}.entrypoints: "https"
      traefik.http.routers.cerebro-app-{{{ traefik.subdomain.router.app }}}.middlewares: "default@file"
      traefik.http.routers.cerebro-app-{{{ traefik.subdomain.router.app }}}.tls.certresolver: "letsEncrypt"
      traefik.http.routers.cerebro-app-{{{ traefik.subdomain.router.app }}}.tls.options: "modern@file"
      traefik.http.routers.cerebro-app-{{{ traefik.subdomain.router.app }}}.tls: "true"
      {{/if}}

  # CEREBRO_CONFIG_FILE is automatically parsed from command-line
  cerebro-api:
    restart: unless-stopped
    build:
      context: {{{ outdir }}}/cerebro
      dockerfile: {{{ outdir }}}/docker/Dockerfile.server
      {{#if dev}}
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
      {{/if}}
    {{#if dev}}
    {{#if trigger}}
    command: cargo watch -w /usr/src/cerebro/trigger --no-vcs-ignores -x "run -p cerebro-server run --host 0.0.0.0 --port 8080 --threads 8"
    {{else}}
    command: cargo watch -w /usr/src/cerebro/cerebro/lib/model -w /usr/src/cerebro/cerebro/stack/server -w /usr/src/cerebro/Cargo.toml -x "run -p cerebro-server run --host 0.0.0.0 --port 8080 --threads 8"
    {{/if}}
    {{else}}
    command: cerebro-server run --host 0.0.0.0 --port 8080 --threads 8
    {{/if}}
    {{#if dev}}
    ports:
      - "8080:8080"
    {{else}}
    # Production mode on localhost also needs to expose the ports to host
    {{#if traefik.is_localhost}}
    ports:
      - "8080:8080"
    {{/if}}
    {{/if}}
    expose:
      - 8080
    volumes:
      {{#if dev }}
      # Path mount of linked repository in development deployment
      - {{{ outdir }}}/cerebro:/usr/src/cerebro
      {{else}}
      # Volume mount for application in production deployment
      - cerebro_api:/data
      {{/if}}
      - {{{ outdir }}}/cerebro/templates:/data/templates:ro
    networks:
      {{#if traefik.is_localhost }}
      - cerebro
      {{else}}
      - cerebro
      - proxy
      {{/if}}
    environment:
      FAKTORY_URL: tcp://:devpass@faktory:7419
      CEREBRO_CONFIG_FILE: /run/secrets/cerebro_config
      CEREBRO_RETENTION_CONFIG_FILE: /run/secrets/retention_config
      CEREBRO_SCHEDULER_ENABLED: "true"   # Stage 3: run the in-process periodic job producer
      CEREBRO_SEED_LIFECYCLE_SCHEDULES: "true"   # S3-4: ensure default lifecycle schedules exist (idempotent)
    depends_on:
      - faktory
      - cerebro-database
      - cerebro-auth-session
      - cerebro-auth-onetime
    security_opt:
      - no-new-privileges:true
    secrets:
      - cerebro_config
      - retention_config
    labels:
      {{#if traefik.is_localhost }}
      traefik.enable: "false"
      {{else}}
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      traefik.http.routers.cerebro-api-{{{ traefik.subdomain.router.api }}}.rule: "Host(`{{{ traefik.subdomain.api }}}.{{{ traefik.web.domain }}}`)"
      traefik.http.routers.cerebro-api-{{{ traefik.subdomain.router.api }}}.entrypoints: "https"
      traefik.http.routers.cerebro-api-{{{ traefik.subdomain.router.api }}}.middlewares: "default@file"
      traefik.http.routers.cerebro-api-{{{ traefik.subdomain.router.api }}}.tls.certresolver: "letsEncrypt"
      traefik.http.routers.cerebro-api-{{{ traefik.subdomain.router.api }}}.tls.options: "modern@file"
      traefik.http.routers.cerebro-api-{{{ traefik.subdomain.router.api }}}.tls: "true"
      {{/if}}

  # Cerebro model and user database 
  cerebro-database:
    image: mongo:8.0
    restart: unless-stopped
    command: mongod --auth --quiet --logpath /dev/null
    expose:
      - 27017
    volumes:
      - cerebro_database:/data/db
      - cerebro_database_cfg:/data/configdb # will create anonymous volumes otherwise if not specified
      - {{{ outdir }}}/mongodb/mongo-init.sh:/docker-entrypoint-initdb.d/mongo-init.sh:ro
    networks:
      - cerebro
    environment:
      MONGODB_CONFIG_FILE: /run/secrets/mongodb_config
    security_opt:
      - no-new-privileges:true
    secrets:
      - mongodb_config


  # Token database for authenticated user sessions
  cerebro-auth-session:
    image: redis:7.0.12-alpine
    restart: unless-stopped
    expose:
      - 6379
    volumes:
      - cerebro_auth_session:/data
    networks:
      - cerebro
    depends_on:  
      - cerebro-database
    security_opt:
      - no-new-privileges:true


  # Token database for one-time verification and password reset
  cerebro-auth-onetime:
    image: redis:7.0.12-alpine
    restart: unless-stopped
    command: --port 6380
    expose:
      - 6380
    volumes:
      - cerebro_auth_onetime:/data
    networks:
      - cerebro
    depends_on:  
      - cerebro-database
    security_opt:
      - no-new-privileges:true

  {{/unless}}

  # Cerebro file-system - not operational
  
  {{#if fs.enabled }}
  cerebro-fs-master:
    restart: unless-stopped
    build:
      context: {{{ outdir }}}/cerebro
      dockerfile: {{{ outdir }}}/docker/Dockerfile.fs
    ports:
      {{#if traefik.is_localhost }}
      - "9324:9324"
      - "9333:9333"
      {{/if}}
      - "19333:19333"  # gRPC port required to be open for current `weed` file upload implementation (weed volume to master node communication)
    command: "weed master -mdir=/data -ip=cerebro-fs-master -ip.bind=0.0.0.0 -metricsPort=9324 -defaultReplication={{{ fs.replication }}}" # diff data center replication to replicate to backup
    expose:
      - 9324
      - 9333
      - 19333
    volumes:
      - cerebro_fs_master:/data
    networks:
      {{#if traefik.is_localhost }}
      - cerebro
      {{else}}
      - cerebro
      - proxy
      {{/if}}
    security_opt:
      - no-new-privileges:true
    labels:
      {{#if traefik.is_localhost }}
      traefik.enable: "false"
      {{else}}
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      traefik.http.routers.cerebro-fs-test.rule: "Host(`fs.cerebro.localhost`)"
      traefik.http.services.cerebro-fs-test.loadbalancer.server.port: "9333"  
      traefik.http.routers.cerebro-fs-test.tls: "false"
      traefik.http.routers.cerebro-fs-test.entrypoints: "http"
      {{/if}}
      
  cerebro-fs-primary:
    restart: unless-stopped
    build:
      context: {{{ outdir }}}/cerebro
      dockerfile: {{{ outdir }}}/docker/Dockerfile.fs
    expose:
      - 8010
      - 18010
      - 9325
    {{#if fs.hot}}
    # Tiered volume server. Model A: hot (SSD) + cold (HDD). Model B: hot (SSD) +
    # warm (HDD, recovery/re-inspection); the cold tier is the S3 remote. Tiers
    # are advertised via SeaweedFS -disk tags ({{{ fs.volume_disks }}}).
    command: 'weed volume -mserver="cerebro-fs-master:9333" -ip.bind=0.0.0.0 -port=8010 -metricsPort=9325 -dataCenter={{{ fs.primary.center }}} -rack={{{ fs.primary.rack }}} -dir={{{ fs.volume_dirs }}} -disk={{{ fs.volume_disks }}}'
    volumes:
      # Host-mounted tier directories
      - {{{ fs.hot.path }}}:{{{ fs.hot.mount }}}
      {{#if fs.warm}}
      - {{{ fs.warm.path }}}:{{{ fs.warm.mount }}}
      {{/if}}
      {{#if fs.cold}}
      - {{{ fs.cold.path }}}:{{{ fs.cold.mount }}}
      {{/if}}
    {{else}}
    command: 'weed volume -mserver="cerebro-fs-master:9333" -ip.bind=0.0.0.0 -port=8010 -metricsPort=9325 -dataCenter={{{ fs.primary.center }}} -rack={{{ fs.primary.rack }}} -dir /data'
    volumes:
      # Host mounted disk
      - {{{ fs.primary.path }}}:/data
    {{/if}}
    networks:
      - cerebro
    depends_on:
      - cerebro-fs-master

  {{#unless fs.hot}}
  {{#if fs.secondary }}
  cerebro-fs-secondary:
    restart: unless-stopped
    build:
      context: {{{ outdir }}}/cerebro
      dockerfile: {{{ outdir }}}/docker/Dockerfile.fs
    expose:
      - 8011
      - 18011
      - 9326
    command: 'weed volume -mserver="cerebro-fs-master:9333" -ip.bind=0.0.0.0 -port=8011 -metricsPort=9326 -dataCenter={{{ fs.secondary.center }}} -rack={{{ fs.secondary.rack }}} -dir /data'
    volumes:
      # Host mounted disk
      - {{{ fs.secondary.path }}}:/data
    networks:
      - cerebro
    depends_on:
      - cerebro-fs-master
  {{/if}}
  {{/unless}}

  {{#if fs.filer.enabled }}
  # Path-addressed SeaweedFS filer (MongoDB metadata store). Used by cerebro-fs
  # when `--fs-access filer` is selected. Reads filer.toml mounted read-only.
  cerebro-fs-filer:
    restart: unless-stopped
    build:
      context: {{{ outdir }}}/cerebro
      dockerfile: {{{ outdir }}}/docker/Dockerfile.fs
    {{#if traefik.is_localhost }}
    ports:
      - "{{{ fs.filer.port }}}:{{{ fs.filer.port }}}"
    {{/if}}
    expose:
      - {{{ fs.filer.port }}}
      - {{{ fs.filer.metrics_port }}}
    command: 'weed -config_dir=/etc/seaweedfs filer -master="cerebro-fs-master:9333" -ip.bind=0.0.0.0 -port={{{ fs.filer.port }}} -metricsPort={{{ fs.filer.metrics_port }}}'
    volumes:
      - {{{ outdir }}}/docker/filer.toml:/etc/seaweedfs/filer.toml:ro
      {{#if fs.remote}}
      - {{{ outdir }}}/docker/remote.conf:/etc/seaweedfs/remote.conf:ro
      {{/if}}
      - cerebro_fs_filer:/data
    networks:
      - cerebro
    depends_on:
      - cerebro-fs-master
      - cerebro-database
  {{/if}}
  
  {{/if}}


  {{#unless fs.fs_only}}
  # === Stage 3: job system ===============================================
  # Producer/consumer split. cerebro-api (+ its Scheduler) ENQUEUE jobs to
  # Faktory; cerebro-worker CONSUMES and runs them. Workers are never run inside
  # API request handlers. Scale heavy-job throughput by running more worker
  # replicas (each handles a bounded number of jobs) — see the blocking-work
  # rationale in the S3-1 notes.

  # Faktory job server: durable queue + web dashboard. OSS image; pin a version
  # and move the password to a secret in production.
  faktory:
    restart: unless-stopped
    image: contribsys/faktory:1.8.0
    command: ["/faktory", "-b", "0.0.0.0:7419", "-w", "0.0.0.0:7420", "-e", "production"]
    environment:
      FAKTORY_PASSWORD: devpass   # must match the FAKTORY_URL used by api + worker
    {{#if dev}}
    ports:
      - "7419:7419"   # job protocol
      - "7420:7420"   # web dashboard -> http://localhost:7420
    {{/if}}
    expose:
      - 7419
      - 7420
    volumes:
      - cerebro_faktory:/var/lib/faktory
    networks:
      - cerebro
    security_opt:
      - no-new-privileges:true

  # Cerebro lifecycle worker (Stage 3): consumes Faktory jobs. In dev it reuses
  # the server image (cargo-watch hot-reload); in production it builds the slim
  # Dockerfile.worker. Uses the filer HTTP API (no `weed` binary needed in the
  # slim image). Provide a service-account token via CEREBRO_WORKER_TOKEN.
  cerebro-worker:
    restart: unless-stopped
    build:
      context: {{{ outdir }}}/cerebro
      dockerfile: {{{ outdir }}}/docker/Dockerfile.{{#if dev}}server{{else}}worker{{/if}}
      {{#if dev}}
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
      {{/if}}
    {{#if dev}}
    command: cargo watch -w /usr/src/cerebro/cerebro/lib/model -w /usr/src/cerebro/cerebro/stack/worker -w /usr/src/cerebro/Cargo.toml -x "run -p cerebro-worker"
    ports:
      - "9464:9464"   # worker /metrics + /health
    volumes:
      - {{{ outdir }}}/cerebro:/usr/src/cerebro
    {{/if}}
    expose:
      - 9464
    networks:
      - cerebro
    environment:
      FAKTORY_URL: tcp://:devpass@faktory:7419
      CEREBRO_API_URL: http://cerebro-api:8080
      # Service Bot authentication (S3-5 #5): the worker logs in as the Bot seeded
      # by mongo-init and rebuilds its token periodically. The password is mounted
      # as a Docker secret (below) and read from CEREBRO_API_BOT_PASSWORD_FILE, so
      # the plaintext is never exposed in the container environment / docker inspect.
      # CEREBRO_API_TOKEN remains as a static-token fallback.
      CEREBRO_API_TOKEN: ${CEREBRO_WORKER_TOKEN:-}
      CEREBRO_API_TOKEN_FILE: /tmp/cerebro_worker_token.json
      CEREBRO_API_BOT_EMAIL: {{{ mongodb.service_bot_email }}}
      CEREBRO_API_BOT_PASSWORD_FILE: /run/secrets/cerebro_worker_bot
      CEREBRO_TEAM: {{{ mongodb.service_team_name }}}
      CEREBRO_DB: {{{ mongodb.service_db_name }}}
      CEREBRO_PROJECT: {{{ mongodb.service_project_name }}}
      CEREBRO_FS_URL: http://cerebro-fs-master
      CEREBRO_FS_PORT: "9333"
      CEREBRO_FS_FILER_URL: http://cerebro-fs-filer:{{{ fs.filer.port }}}
      CEREBRO_FS_ACCESS: filer
      CEREBRO_WORKER_QUEUES: default,lifecycle,maintenance
      CEREBRO_WORKER_METRICS_ADDR: 0.0.0.0:9464
      RUST_LOG: info
    secrets:
      - cerebro_worker_bot
    depends_on:
      - faktory
      - cerebro-api
    security_opt:
      - no-new-privileges:true
  {{/unless}}


volumes:
  {{#unless fs.fs_only}}
  cerebro_app:
    driver: local
  cerebro_api:
    driver: local
  cerebro_database:
    driver: local
  cerebro_database_cfg:
    driver: local
  cerebro_auth_session:
    driver: local
  cerebro_auth_onetime:
    driver: local
  cerebro_faktory:
    driver: local
  {{/unless}}
  {{#if fs.enabled }}
  cerebro_fs_master:
    driver: local
  {{/if}}
  {{#if fs.filer.enabled }}
  cerebro_fs_filer:
    driver: local
  {{/if}}



networks:

  {{#if traefik.is_localhost }}
  cerebro:
    external: false
    name: {{{ name }}}
  {{else}}
  cerebro:
    external: false
    name: {{{ name }}}
  proxy:
    name: {{{ traefik.network.name }}}   
    external: {{{ traefik.network.external }}}
  {{/if}}

# Do not need to use files as secrets necessarily but allows for easier environmental variable settings
secrets:
  cerebro_config:
    file: {{{ outdir }}}/cerebro_api/server.toml
  mongodb_config:
    file: {{{ outdir }}}/mongodb/database.env
  cerebro_worker_bot:
    file: {{{ outdir }}}/mongodb/worker_bot.secret
  retention_config:
    file: {{{ outdir }}}/fs/retention.env
  